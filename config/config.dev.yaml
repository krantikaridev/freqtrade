# Development Environment Configuration
# Extends config.base.yaml with dev-specific overrides

dry_run: true
trading_mode: "futures"
margin_mode: "isolated"

# Dev Settings
log_level: "DEBUG"
trader_enabled: false
api_server:
  enabled: true
  listen_ip_address: "127.0.0.1"
  listen_port: 8080

# Reduced stake for dev testing
stake_amount: "100"

# More verbosity for development
verbosity: 2
